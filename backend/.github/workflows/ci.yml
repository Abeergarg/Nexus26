name: Nexus26 CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Code Formatting Check (Black)
        working-directory: backend
        run: python -m black --check app tests load_generator.py

      - name: Linting (Flake8)
        working-directory: backend
        run: python -m flake8 app tests --max-line-length=120

      - name: Security Static Analysis (Bandit)
        working-directory: backend
        run: python -m bandit -r app -ll --configfile pyproject.toml
        continue-on-error: false

      - name: Dependency Vulnerability Scan (pip-audit)
        working-directory: backend
        run: pip-audit --requirement requirements.txt
        continue-on-error: true

      - name: Run Tests with Coverage
        working-directory: backend
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -v

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 30
